name: Quick Deploy Customer360

on:
  workflow_dispatch:
    inputs:
      # --- Azure identity ---
      azure_subscription_id:
        description: 'Azure Subscription ID'
        required: true
      azure_tenant_id:
        description: 'Azure Tenant ID'
        required: true
      azure_client_id:
        description: 'OIDC Entra App Client ID'
        required: true

      # --- Azure infra ---
      resource_group:
        description: 'Target resource group (created if absent)'
        required: true
      location:
        description: 'Azure region (e.g. centralindia, eastus)'
        required: true
        default: 'centralindia'
      base_name:
        description: 'Base name for resources (e.g. cust360)'
        required: true
        default: 'cust360'
      environment:
        description: 'Environment (dev / test / prod)'
        required: true
        default: 'dev'

      # --- Fabric workspace ---
      workspace_name:
        description: 'Fabric workspace display name'
        required: true
      lakehouse_name:
        description: 'Lakehouse name'
        required: true
        default: 'Customer360Lakehouse'
      table_name:
        description: 'Delta table name for CSV data'
        required: true
        default: 'Customer360'
      dataagent_name:
        description: 'Fabric Data Agent name'
        required: true
        default: 'Customer360Agent'
      fabric_sku:
        description: |
          Provision a NEW Fabric capacity with this SKU.
          Options: F2 | F4 | F8 | F16 | F32 | F64 | F128 | F256 | F512 | F1024 | F2048 | Trial
          Leave blank to skip provisioning and supply fabric_capacity_id instead.
        required: false
        default: ''
        type: choice
        options:
          - ''
          - F2
          - F4
          - F8
          - F16
          - F32
          - F64
          - F128
          - F256
          - F512
          - F1024
          - F2048
          - Trial
      fabric_capacity_admin:
        description: 'Email / UPN of the Fabric capacity admin (required when fabric_sku is set, e.g. admin@contoso.com)'
        required: false
        default: ''
      fabric_capacity_id:
        description: 'Existing Fabric capacityId GUID (Fabric Admin -> Capacity settings). Ignored when fabric_sku is set - the new capacity ID is used automatically.'
        required: false
        default: ''
      skip_data_upload:
        description: 'Skip CSV upload/table load (set true if table already loaded)'
        required: false
        default: 'false'

      # --- Power BI ---
      powerbi_report_url:
        description: 'Power BI embedded report URL. Leave blank on first deploy - workflow will create the report. On re-deploy, paste the URL here.'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ inputs.azure_client_id }}
          tenant-id: ${{ inputs.azure_tenant_id }}
          subscription-id: ${{ inputs.azure_subscription_id }}

      # --- Step 1: Infrastructure ---
      - name: Create Resource Group and Deploy Bicep Infrastructure
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            echo "Creating resource group: ${{ inputs.resource_group }}"
            az group create \
              --name "${{ inputs.resource_group }}" \
              --location "${{ inputs.location }}" \
              --output table

            echo "Deploying Bicep infrastructure..."

            # Build optional Fabric capacity parameters.
            # Pre-check: if the capacity already exists (e.g. from a previous run),
            # skip the fabricSku param so Bicep does not try to re-create it and
            # hit a globally-unique name conflict in the Fabric RP.
            FABRIC_PARAMS=""
            if [ -n "${{ inputs.fabric_sku }}" ]; then
              CAP_DISPLAY_NAME="cap$(echo '${{ inputs.base_name }}' | tr '[:upper:]' '[:lower:]' | tr -d '-')$(echo '${{ inputs.environment }}' | tr '[:upper:]' '[:lower:]' | tr -d '-')"
              FABRIC_TOKEN=$(az account get-access-token --resource https://api.fabric.microsoft.com --query accessToken -o tsv 2>/dev/null || true)
              CAP_ALREADY_EXISTS=""
              if [ -n "$FABRIC_TOKEN" ]; then
                CAP_ALREADY_EXISTS=$(curl -sf \
                  -H "Authorization: Bearer $FABRIC_TOKEN" \
                  "https://api.fabric.microsoft.com/v1/capacities" \
                  | python3 -c "import sys,json;d=json.load(sys.stdin);t='$CAP_DISPLAY_NAME'.lower();print(next((c['id'] for c in d.get('value',[]) if c.get('displayName','').lower()==t),''))" 2>/dev/null || true)
              fi

              if [ -n "$CAP_ALREADY_EXISTS" ]; then
                echo "  [SKIP] Fabric capacity '$CAP_DISPLAY_NAME' already exists (ID: $CAP_ALREADY_EXISTS) - reusing it, skipping Bicep creation"
              else
                FABRIC_PARAMS="fabricSku=${{ inputs.fabric_sku }}"

                # Resolve the capacity admin to an Object ID.
                # The Fabric RP requires the member to be an existing Entra ID
                # user or service principal - passing an invalid UPN causes
                # "All provided principals must be existing..." ARM error.
                ADMIN_OID=""
                if [ -n "${{ inputs.fabric_capacity_admin }}" ]; then
                  echo "  Resolving capacity admin: ${{ inputs.fabric_capacity_admin }}"
                  ADMIN_OID=$(az ad user show --id "${{ inputs.fabric_capacity_admin }}" --query id -o tsv 2>/dev/null || \
                              az ad sp show  --id "${{ inputs.fabric_capacity_admin }}" --query id -o tsv 2>/dev/null || echo "")
                  if [ -z "$ADMIN_OID" ]; then
                    echo "  [ERROR] '${{ inputs.fabric_capacity_admin }}' was not found in Entra ID."
                    echo "  Provide a valid UPN (user@domain.com) of an existing Entra ID user, or leave fabric_capacity_admin blank to use the deploying service principal."
                    exit 1
                  fi
                  echo "  Admin resolved -> OID: $ADMIN_OID"
                else
                  # No admin supplied: fall back to the deploying service principal
                  echo "  No fabric_capacity_admin set - using deploying service principal as capacity admin"
                  ADMIN_OID=$(az ad sp show --id "${{ inputs.azure_client_id }}" --query id -o tsv 2>/dev/null || echo "")
                  if [ -z "$ADMIN_OID" ]; then
                    echo "  [WARN] Could not resolve deploying SP OID - fabricCapacityAdmins will be empty (may fail)"
                  else
                    echo "  Deploying SP OID: $ADMIN_OID"
                  fi
                fi

                if [ -n "$ADMIN_OID" ]; then
                  FABRIC_PARAMS="$FABRIC_PARAMS fabricCapacityAdmins=[\"$ADMIN_OID\"]"
                fi
                echo "  [NEW] Provisioning Fabric capacity SKU: ${{ inputs.fabric_sku }}"
              fi
            fi

            if ! az deployment group create \
              --name "customer360-infra" \
              --resource-group "${{ inputs.resource_group }}" \
              --template-file infra/main.bicep \
              --parameters \
                baseName="${{ inputs.base_name }}" \
                env="${{ inputs.environment }}" \
                location="${{ inputs.location }}" \
                $FABRIC_PARAMS \
              --output table; then
              echo "Bicep deployment failed. Fetching ARM operation details..."
              az deployment operation group list \
                --resource-group "${{ inputs.resource_group }}" \
                --name "customer360-infra" \
                --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceType,error:properties.statusMessage}" \
                -o json 2>/dev/null || true
              exit 1
            fi
            echo "Infrastructure deployment complete"

      # --- Step 2: Collect infra outputs ---
      - name: Collect deployment outputs
        id: outputs
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            RG="${{ inputs.resource_group }}"
            ACR_NAME=$(az acr list -g "$RG" --query "[0].name" -o tsv)
            BE_APP=$(az webapp list -g "$RG" --query "[?contains(name,'backend')].name | [0]" -o tsv)
            FE_APP=$(az webapp list -g "$RG" --query "[?contains(name,'frontend')].name | [0]" -o tsv)
            KV_NAME=$(az keyvault list -g "$RG" --query "[0].name" -o tsv)
            APPI_CS=$(az monitor app-insights component list -g "$RG" \
              --query "[0].connectionString" -o tsv 2>/dev/null || true)

            # Fabric capacity GUID lookup.
            # The Microsoft.Fabric/capacities ARM resource does NOT expose the
            # Fabric-internal capacity GUID as a property.  After Bicep provisions
            # the capacity we query the Fabric REST API (GET /v1/capacities) and
            # match on the displayName to retrieve the GUID that the workspace
            # assignment API requires.
            FABRIC_CAP_ID=""
            if [ -n "${{ inputs.fabric_sku }}" ]; then
              # Derive the capacity display name the same way main.bicep does
              CAP_DISPLAY_NAME="cap$(echo '${{ inputs.base_name }}' | tr '[:upper:]' '[:lower:]' | tr -d '-')$(echo '${{ inputs.environment }}' | tr '[:upper:]' '[:lower:]' | tr -d '-')"
              echo "  Looking up Fabric capacity GUID for: $CAP_DISPLAY_NAME"

              FABRIC_TOKEN=$(az account get-access-token \
                --resource https://api.fabric.microsoft.com \
                --query accessToken -o tsv)

              FABRIC_CAP_ID=$(curl -sf \
                -H "Authorization: Bearer $FABRIC_TOKEN" \
                "https://api.fabric.microsoft.com/v1/capacities" \
                | python3 -c "import sys,json;d=json.load(sys.stdin);t='$CAP_DISPLAY_NAME'.lower();print(next((c['id'] for c in d.get('value',[]) if c.get('displayName','').lower()==t),''))" 2>/dev/null || true)

              if [ -n "$FABRIC_CAP_ID" ]; then
                echo "  [OK] Fabric capacity GUID: $FABRIC_CAP_ID"
              else
                echo "  [WARN] Could not resolve Fabric capacity GUID - workspace will not be assigned to the new capacity"
              fi
            fi

            echo "acr_name=$ACR_NAME"             >> $GITHUB_OUTPUT
            echo "backend_app=$BE_APP"             >> $GITHUB_OUTPUT
            echo "frontend_app=$FE_APP"            >> $GITHUB_OUTPUT
            echo "kv_name=$KV_NAME"               >> $GITHUB_OUTPUT
            echo "app_insights_cs=$APPI_CS"       >> $GITHUB_OUTPUT
            echo "fabric_capacity_id=$FABRIC_CAP_ID" >> $GITHUB_OUTPUT
            echo "ACR: $ACR_NAME  Backend: $BE_APP  Frontend: $FE_APP  KV: $KV_NAME"

      # --- Step 3: Build backend Docker image ---
      - name: Build and push backend Docker image
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            echo "Building backend image (Fabric Data Agent client)..."
            az acr build \
              --registry "${{ steps.outputs.outputs.acr_name }}" \
              --image fabric-customer360-backend:latest \
              --file backend/Dockerfile \
              backend
            echo "Backend image pushed"

      # --- Step 4: Fabric setup (runs BEFORE frontend build so we can
      #     bake the Power BI embed URL into the React bundle) ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install azure-identity requests

      - name: Run Fabric setup
        id: fabric_setup
        env:
          AZURE_SUBSCRIPTION_ID: ${{ inputs.azure_subscription_id }}
        run: |
          set -e
          echo "Running Fabric setup..."

          # Capacity ID resolution (priority order):
          #   1. Newly provisioned capacity from Bicep (fabric_sku was set)
          #   2. Manually supplied existing capacity GUID (fabric_capacity_id)
          #   3. Empty - workspace is left on its current capacity
          CAPACITY_ID="${{ steps.outputs.outputs.fabric_capacity_id }}"
          if [ -z "$CAPACITY_ID" ]; then
            CAPACITY_ID="${{ inputs.fabric_capacity_id }}"
          fi
          echo "  Using Fabric capacity ID: ${CAPACITY_ID:-'(none)'}"

          SKIP_FLAG=""
          if [ "${{ inputs.skip_data_upload }}" = "true" ]; then
            SKIP_FLAG="--skip_data_upload"
          fi

          python scripts/fabric_setup.py \
            --workspace_name "${{ inputs.workspace_name }}" \
            --lakehouse_name "${{ inputs.lakehouse_name }}" \
            --csv_path "sample-data/customer360.csv" \
            --table_name "${{ inputs.table_name }}" \
            --dataagent_name "${{ inputs.dataagent_name }}" \
            --capacity_id "$CAPACITY_ID" \
            --report_name "Customer360 Report" \
            $SKIP_FLAG

          echo "Fabric setup complete"

      # --- Step 5: Build frontend AFTER Fabric setup so Power BI URL is available ---
      - name: Build and push frontend Docker image
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            BE_URL="https://${{ steps.outputs.outputs.backend_app }}.azurewebsites.net"

            PBI_URL="${{ inputs.powerbi_report_url }}"
            if [ -z "$PBI_URL" ]; then
              PBI_URL="${{ steps.fabric_setup.outputs.powerbi_embed_url }}"
            fi

            echo "Building frontend image..."
            echo "  VITE_BACKEND_URL        = $BE_URL"
            echo "  VITE_POWERBI_REPORT_URL = $PBI_URL"

            az acr build \
              --registry "${{ steps.outputs.outputs.acr_name }}" \
              --image fabric-customer360-frontend:latest \
              --file frontend/Dockerfile \
              --build-arg VITE_BACKEND_URL="$BE_URL" \
              --build-arg VITE_POWERBI_REPORT_URL="$PBI_URL" \
              frontend
            echo "Frontend image pushed"

      # --- Step 6: Configure backend App Service ---
      - name: Configure backend App Service
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            RG="${{ inputs.resource_group }}"
            BE="${{ steps.outputs.outputs.backend_app }}"
            ACR="${{ steps.outputs.outputs.acr_name }}"
            FE_URL="https://${{ steps.outputs.outputs.frontend_app }}.azurewebsites.net"

            WORKSPACE_ID="${{ steps.fabric_setup.outputs.workspace_id }}"
            DATAAGENT_ID="${{ steps.fabric_setup.outputs.dataagent_id }}"

            # Resolve Power BI URL: prefer the manually supplied input, then
            # fall back to what fabric_setup auto-created.
            PBI_URL="${{ inputs.powerbi_report_url }}"
            if [ -z "$PBI_URL" ]; then
              PBI_URL="${{ steps.fabric_setup.outputs.powerbi_embed_url }}"
            fi

            echo "Configuring backend ($BE)..."
            echo "  FABRIC_WORKSPACE_ID = $WORKSPACE_ID"
            echo "  FABRIC_DATAAGENT_ID = $DATAAGENT_ID"
            echo "  POWERBI_REPORT_URL  = $PBI_URL"

            ACR_USER=$(az acr credential show --name "$ACR" --query "username" -o tsv)
            ACR_PASS=$(az acr credential show --name "$ACR" --query "passwords[0].value" -o tsv)

            az webapp config container set \
              --resource-group "$RG" --name "$BE" \
              --docker-custom-image-name "${ACR}.azurecr.io/fabric-customer360-backend:latest" \
              --docker-registry-server-url "https://${ACR}.azurecr.io" \
              --docker-registry-server-user "$ACR_USER" \
              --docker-registry-server-password "$ACR_PASS"

            az webapp config appsettings set \
              --resource-group "$RG" --name "$BE" \
              --settings \
                FABRIC_WORKSPACE_ID="$WORKSPACE_ID" \
                FABRIC_DATAAGENT_ID="$DATAAGENT_ID" \
                POWERBI_REPORT_URL="$PBI_URL" \
                CORS_ALLOWED_ORIGINS="$FE_URL" \
                APPLICATIONINSIGHTS_CONNECTION_STRING="${{ steps.outputs.outputs.app_insights_cs }}" \
                WEBSITES_ENABLE_APP_SERVICE_STORAGE="false" \
                DOCKER_REGISTRY_SERVER_URL="https://${ACR}.azurecr.io" \
                DOCKER_ENABLE_CI="true"

            az webapp restart --resource-group "$RG" --name "$BE"
            echo "Backend configured and restarted"

      # --- Step 7: Configure frontend App Service ---
      - name: Configure frontend App Service
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            RG="${{ inputs.resource_group }}"
            FE="${{ steps.outputs.outputs.frontend_app }}"
            ACR="${{ steps.outputs.outputs.acr_name }}"

            echo "Configuring frontend ($FE)..."

            ACR_USER=$(az acr credential show --name "$ACR" --query "username" -o tsv)
            ACR_PASS=$(az acr credential show --name "$ACR" --query "passwords[0].value" -o tsv)

            az webapp config container set \
              --resource-group "$RG" --name "$FE" \
              --docker-custom-image-name "${ACR}.azurecr.io/fabric-customer360-frontend:latest" \
              --docker-registry-server-url "https://${ACR}.azurecr.io" \
              --docker-registry-server-user "$ACR_USER" \
              --docker-registry-server-password "$ACR_PASS"

            az webapp config appsettings set \
              --resource-group "$RG" --name "$FE" \
              --settings \
                WEBSITES_ENABLE_APP_SERVICE_STORAGE="false" \
                DOCKER_REGISTRY_SERVER_URL="https://${ACR}.azurecr.io" \
                DOCKER_ENABLE_CI="true" \
                WEBSITES_PORT="8080"

            az webapp restart --resource-group "$RG" --name "$FE"
            echo "Frontend configured and restarted"

      # --- Deployment Summary ---
      - name: Deployment Summary
        run: |
          PBI_URL="${{ inputs.powerbi_report_url }}"
          if [ -z "$PBI_URL" ]; then
            PBI_URL="${{ steps.fabric_setup.outputs.powerbi_embed_url }}"
          fi

          echo "========================================================"
          echo " Customer360 Deployment Complete!"
          echo "========================================================"
          echo ""
          echo "Application URLs:"
          echo "  Frontend : https://${{ steps.outputs.outputs.frontend_app }}.azurewebsites.net"
          echo "  Backend  : https://${{ steps.outputs.outputs.backend_app }}.azurewebsites.net"
          echo "  Health   : https://${{ steps.outputs.outputs.backend_app }}.azurewebsites.net/health"
          echo ""
          echo "Fabric Resources:"
          echo "  Workspace   : ${{ inputs.workspace_name }}"
          echo "  Workspace ID: ${{ steps.fabric_setup.outputs.workspace_id }}"
          if [ -n "${{ steps.outputs.outputs.fabric_capacity_id }}" ]; then
            echo "  Capacity SKU: ${{ inputs.fabric_sku }} (newly provisioned)"
            echo "  Capacity ID : ${{ steps.outputs.outputs.fabric_capacity_id }}"
          elif [ -n "${{ inputs.fabric_capacity_id }}" ]; then
            echo "  Capacity ID : ${{ inputs.fabric_capacity_id }} (existing)"
          else
            echo "  Capacity    : (none specified - using workspace default)"
          fi
          echo "  Workspace URL: ${{ steps.fabric_setup.outputs.workspace_url }}"
          echo "  Data Agent  : ${{ inputs.dataagent_name }}"
          echo "  Agent ID    : ${{ steps.fabric_setup.outputs.dataagent_id }}"
          echo ""
          echo "Power BI:"
          echo "  Semantic Model ID : ${{ steps.fabric_setup.outputs.semantic_model_id }}"
          echo "  Report ID         : ${{ steps.fabric_setup.outputs.report_id }}"
          if [ -n "$PBI_URL" ]; then
            echo "  Embed URL         : $PBI_URL"
            echo "  Power BI is embedded in the frontend"
          else
            echo "  Power BI not yet embedded."
            echo "  Re-run workflow with powerbi_report_url set to embed it."
          fi
          echo ""
          echo "Backend env vars set:"
          echo "  FABRIC_WORKSPACE_ID = ${{ steps.fabric_setup.outputs.workspace_id }}"
          echo "  FABRIC_DATAAGENT_ID = ${{ steps.fabric_setup.outputs.dataagent_id }}"
          echo "========================================================"
