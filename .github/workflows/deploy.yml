name: Quick Deploy Customer360

on:
  workflow_dispatch:
    inputs:
      # ── Azure identity ─────────────────────────────────────────────────────
      azure_subscription_id:
        description: 'Azure Subscription ID'
        required: true
      azure_tenant_id:
        description: 'Azure Tenant ID'
        required: true
      azure_client_id:
        description: 'OIDC Entra App Client ID'
        required: true

      # ── Azure infra ────────────────────────────────────────────────────────
      resource_group:
        description: 'Target resource group (created if absent)'
        required: true
      location:
        description: 'Azure region (e.g. centralindia, eastus)'
        required: true
        default: 'centralindia'
      base_name:
        description: 'Base name for resources (e.g. cust360)'
        required: true
        default: 'cust360'
      env:
        description: 'Environment (dev / test / prod)'
        required: true
        default: 'dev'

      # ── Fabric workspace ───────────────────────────────────────────────────
      workspace_name:
        description: 'Fabric workspace display name'
        required: true
      lakehouse_name:
        description: 'Lakehouse name'
        required: true
        default: 'Customer360Lakehouse'
      table_name:
        description: 'Delta table name for CSV data'
        required: true
        default: 'Customer360'
      dataagent_name:
        description: 'Fabric Data Agent name'
        required: true
        default: 'Customer360Agent'
      fabric_capacity_id:
        description: 'Fabric capacityId GUID (from Fabric Admin → Capacity settings)'
        required: false
        default: ''
      skip_data_upload:
        description: 'Skip CSV upload/table load (set true if table already loaded)'
        required: false
        default: 'false'

      # ── Power BI ───────────────────────────────────────────────────────────
      powerbi_report_url:
        description: |
          Power BI embedded report URL.
          Leave blank on first deploy — the workflow will create the report and output
          its URL. On re-deploy, paste the URL here to embed it in the frontend.
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ inputs.azure_client_id }}
          tenant-id: ${{ inputs.azure_tenant_id }}
          subscription-id: ${{ inputs.azure_subscription_id }}

      # ── Step 1: Infrastructure ────────────────────────────────────────────
      - name: Create Resource Group and Deploy Bicep Infrastructure
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            echo "Creating resource group: ${{ inputs.resource_group }}"
            az group create \
              --name "${{ inputs.resource_group }}" \
              --location "${{ inputs.location }}" \
              --output table

            echo "Deploying Bicep infrastructure..."
            az deployment group create \
              --resource-group "${{ inputs.resource_group }}" \
              --template-file infra/main.bicep \
              --parameters \
                baseName="${{ inputs.base_name }}" \
                env="${{ inputs.env }}" \
                location="${{ inputs.location }}" \
              --output table
            echo "Infrastructure deployment complete"

      # ── Step 2: Collect infra outputs ────────────────────────────────────
      - name: Collect deployment outputs
        id: outputs
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            RG="${{ inputs.resource_group }}"
            ACR_NAME=$(az acr list -g "$RG" --query "[0].name" -o tsv)
            BE_APP=$(az webapp list -g "$RG" --query "[?contains(name,'backend')].name | [0]" -o tsv)
            FE_APP=$(az webapp list -g "$RG" --query "[?contains(name,'frontend')].name | [0]" -o tsv)
            KV_NAME=$(az keyvault list -g "$RG" --query "[0].name" -o tsv)
            APPI_CS=$(az monitor app-insights component list -g "$RG" \
              --query "[0].connectionString" -o tsv 2>/dev/null || true)

            echo "acr_name=$ACR_NAME"       >> $GITHUB_OUTPUT
            echo "backend_app=$BE_APP"       >> $GITHUB_OUTPUT
            echo "frontend_app=$FE_APP"      >> $GITHUB_OUTPUT
            echo "kv_name=$KV_NAME"         >> $GITHUB_OUTPUT
            echo "app_insights_cs=$APPI_CS" >> $GITHUB_OUTPUT
            echo "ACR: $ACR_NAME  Backend: $BE_APP  Frontend: $FE_APP  KV: $KV_NAME"

      # ── Step 3: Build backend Docker image ───────────────────────────────
      - name: Build and push backend Docker image
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            echo "Building backend image (Fabric Data Agent client)..."
            az acr build \
              --registry "${{ steps.outputs.outputs.acr_name }}" \
              --image fabric-customer360-backend:latest \
              --file backend/Dockerfile \
              backend
            echo "Backend image pushed"

      # ── Step 4: Fabric setup (runs BEFORE frontend build so we can ────────
      #    bake the Power BI embed URL into the React bundle)               ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install azure-identity requests

      - name: Run Fabric setup
        id: fabric_setup
        env:
          AZURE_SUBSCRIPTION_ID: ${{ inputs.azure_subscription_id }}
        run: |
          set -e
          echo "Running Fabric setup (Workspace → Lakehouse → Data Agent → Semantic Model → Report)..."

          SKIP_FLAG=""
          if [ "${{ inputs.skip_data_upload }}" = "true" ]; then
            SKIP_FLAG="--skip_data_upload"
          fi

          python scripts/fabric_setup.py \
            --workspace_name "${{ inputs.workspace_name }}" \
            --lakehouse_name "${{ inputs.lakehouse_name }}" \
            --csv_path "sample-data/customer360.csv" \
            --table_name "${{ inputs.table_name }}" \
            --dataagent_name "${{ inputs.dataagent_name }}" \
            --capacity_id "${{ inputs.fabric_capacity_id }}" \
            --report_name "Customer360 Report" \
            $SKIP_FLAG

          echo "Fabric setup complete"

      # ── Step 5: Build frontend — AFTER Fabric setup so Power BI URL ──────
      #    (from fabric_setup or user input) is available as a build arg   ──
      - name: Build and push frontend Docker image
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            BE_URL="https://${{ steps.outputs.outputs.backend_app }}.azurewebsites.net"

            # Prefer explicitly provided URL; fall back to auto-created one
            PBI_URL="${{ inputs.powerbi_report_url }}"
            if [ -z "$PBI_URL" ]; then
              PBI_URL="${{ steps.fabric_setup.outputs.powerbi_embed_url }}"
            fi

            echo "Building frontend image..."
            echo "  VITE_BACKEND_URL      = $BE_URL"
            echo "  VITE_POWERBI_REPORT_URL = $PBI_URL"

            az acr build \
              --registry "${{ steps.outputs.outputs.acr_name }}" \
              --image fabric-customer360-frontend:latest \
              --file frontend/Dockerfile \
              --build-arg VITE_BACKEND_URL="$BE_URL" \
              --build-arg VITE_POWERBI_REPORT_URL="$PBI_URL" \
              frontend
            echo "Frontend image pushed"

      # ── Step 6: Configure backend App Service ────────────────────────────
      - name: Configure backend App Service
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            RG="${{ inputs.resource_group }}"
            BE="${{ steps.outputs.outputs.backend_app }}"
            ACR="${{ steps.outputs.outputs.acr_name }}"
            FE_URL="https://${{ steps.outputs.outputs.frontend_app }}.azurewebsites.net"

            WORKSPACE_ID="${{ steps.fabric_setup.outputs.workspace_id }}"
            DATAAGENT_ID="${{ steps.fabric_setup.outputs.dataagent_id }}"

            echo "Configuring backend ($BE)..."
            echo "  FABRIC_WORKSPACE_ID = $WORKSPACE_ID"
            echo "  FABRIC_DATAAGENT_ID = $DATAAGENT_ID"

            ACR_USER=$(az acr credential show --name "$ACR" --query "username" -o tsv)
            ACR_PASS=$(az acr credential show --name "$ACR" --query "passwords[0].value" -o tsv)

            az webapp config container set \
              --resource-group "$RG" --name "$BE" \
              --docker-custom-image-name "${ACR}.azurecr.io/fabric-customer360-backend:latest" \
              --docker-registry-server-url "https://${ACR}.azurecr.io" \
              --docker-registry-server-user "$ACR_USER" \
              --docker-registry-server-password "$ACR_PASS"

            az webapp config appsettings set \
              --resource-group "$RG" --name "$BE" \
              --settings \
                FABRIC_WORKSPACE_ID="$WORKSPACE_ID" \
                FABRIC_DATAAGENT_ID="$DATAAGENT_ID" \
                CORS_ALLOWED_ORIGINS="$FE_URL" \
                APPLICATIONINSIGHTS_CONNECTION_STRING="${{ steps.outputs.outputs.app_insights_cs }}" \
                WEBSITES_ENABLE_APP_SERVICE_STORAGE="false" \
                DOCKER_REGISTRY_SERVER_URL="https://${ACR}.azurecr.io" \
                DOCKER_ENABLE_CI="true"

            az webapp restart --resource-group "$RG" --name "$BE"
            echo "Backend configured and restarted"

      # ── Step 7: Configure frontend App Service ───────────────────────────
      - name: Configure frontend App Service
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            RG="${{ inputs.resource_group }}"
            FE="${{ steps.outputs.outputs.frontend_app }}"
            ACR="${{ steps.outputs.outputs.acr_name }}"

            echo "Configuring frontend ($FE)..."

            ACR_USER=$(az acr credential show --name "$ACR" --query "username" -o tsv)
            ACR_PASS=$(az acr credential show --name "$ACR" --query "passwords[0].value" -o tsv)

            az webapp config container set \
              --resource-group "$RG" --name "$FE" \
              --docker-custom-image-name "${ACR}.azurecr.io/fabric-customer360-frontend:latest" \
              --docker-registry-server-url "https://${ACR}.azurecr.io" \
              --docker-registry-server-user "$ACR_USER" \
              --docker-registry-server-password "$ACR_PASS"

            az webapp config appsettings set \
              --resource-group "$RG" --name "$FE" \
              --settings \
                WEBSITES_ENABLE_APP_SERVICE_STORAGE="false" \
                DOCKER_REGISTRY_SERVER_URL="https://${ACR}.azurecr.io" \
                DOCKER_ENABLE_CI="true" \
                WEBSITES_PORT="8080"

            az webapp restart --resource-group "$RG" --name "$FE"
            echo "Frontend configured and restarted"

      # ── Deployment Summary ────────────────────────────────────────────────
      - name: Deployment Summary
        run: |
          PBI_URL="${{ inputs.powerbi_report_url }}"
          if [ -z "$PBI_URL" ]; then
            PBI_URL="${{ steps.fabric_setup.outputs.powerbi_embed_url }}"
          fi

          echo "========================================================"
          echo " Customer360 Deployment Complete!"
          echo "========================================================"
          echo ""
          echo "🌐 Application URLs:"
          echo "  Frontend : https://${{ steps.outputs.outputs.frontend_app }}.azurewebsites.net"
          echo "  Backend  : https://${{ steps.outputs.outputs.backend_app }}.azurewebsites.net"
          echo "  Health   : https://${{ steps.outputs.outputs.backend_app }}.azurewebsites.net/health"
          echo ""
          echo "🏭 Fabric Resources:"
          echo "  Workspace   : ${{ inputs.workspace_name }}"
          echo "  Workspace ID: ${{ steps.fabric_setup.outputs.workspace_id }}"
          echo "  Workspace URL: ${{ steps.fabric_setup.outputs.workspace_url }}"
          echo "  Lakehouse   : ${{ inputs.lakehouse_name }}"
          echo "  Table       : ${{ inputs.table_name }}"
          echo "  Data Agent  : ${{ inputs.dataagent_name }}"
          echo "  Agent ID    : ${{ steps.fabric_setup.outputs.dataagent_id }}"
          echo ""
          echo "📊 Power BI:"
          echo "  Semantic Model ID: ${{ steps.fabric_setup.outputs.semantic_model_id }}"
          echo "  Report ID        : ${{ steps.fabric_setup.outputs.report_id }}"
          if [ -n "$PBI_URL" ]; then
            echo "  Embed URL        : $PBI_URL"
            echo "  ✅ Power BI is embedded in the frontend"
          else
            echo "  ⚠️  Power BI not yet embedded. Steps to add it:"
            echo "  1. Open: ${{ steps.fabric_setup.outputs.workspace_url }}"
            echo "  2. Open '${LAKEHOUSE_NAME:-Customer360Lakehouse}' → New report"
            echo "  3. Save and use File → Embed → Website or portal"
            echo "  4. Re-run this workflow with: powerbi_report_url=<url> skip_data_upload=true"
          fi
          echo ""
          echo "🔧 Backend env vars set:"
          echo "  FABRIC_WORKSPACE_ID = ${{ steps.fabric_setup.outputs.workspace_id }}"
          echo "  FABRIC_DATAAGENT_ID = ${{ steps.fabric_setup.outputs.dataagent_id }}"
          echo "========================================================"
